<!doctype html>
<html lang="et">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaart — Orhideed </title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

<style>
  /* CSS muutujad ja mobiili‑kõrguse tugi */
  :root {
    --topbar-height: 64px;
    --footer-height: 36px;
    /* --vh muutuja täidetakse JS-iga (et vältida 100vh probleeme mobiilis) */
    --vh: 1vh;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    -webkit-text-size-adjust: 100%;
    background: var(--bg, #f7f8fa);
  }

  /* Map ja peamised alad kasutavad dünaamilist kõrgust */
  #map {
    width: 100%;
    /* kasutame var(--vh) et vältida aadressiriba muutustest tekkivaid tühikuid */
    height: calc(var(--vh, 1vh) * 100 - var(--topbar-height) - var(--footer-height));
    min-height: 200px;
  }

  /* Täisekraan laadija (loader) — servast servani */
  #page-loader {
    position: fixed;
    inset: 0; /* top:0; right:0; bottom:0; left:0; */
    width: 100vw;
    height: 100dvh; /* eelistame 100dvh kui brauser toetab */
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    z-index: 99999;
    -webkit-backdrop-filter: blur(0); /* ei ole vajalik, aga turvaline */
    box-sizing: border-box;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Lihtne animatsioon/tekst loaderile */
  #page-loader .inner {
    text-align: center;
    color: #1f2937;
    font-weight: 600;
    font-size: 14px;
  }
</style>


  <!-- OpenLayers CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.4.0/ol.css" />

  <style>
    :root{
      --sidebar-width: 320px;
      --topbar-height: 64px;
      --footer-height: 36px;
      --bg: #f7f8fa;
    }
    html,body { height:100%; margin:0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; background:var(--bg); color:#222; }
    .topbar {
      height: var(--topbar-height);
      display:flex; align-items:center; justify-content:space-between;
      padding:8px 12px; background:#fff; border-bottom:1px solid rgba(0,0,0,0.06);
      box-shadow:0 1px 2px rgba(0,0,0,0.04); z-index:2100;
    }
    .app-title { margin:0; font-size:18px; font-weight:600; color:#1f2937; }
    .top-controls { display:flex; align-items:center; gap:12px; }
    .toggle-wrap { display:flex; align-items:center; gap:8px; }
    .switch { position: relative; display:inline-block; width:44px; height:24px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; transition:.2s; border-radius:24px; }
    .slider:before { content:""; position:absolute; height:18px; width:18px; left:3px; top:3px; background:white; transition:.2s; border-radius:50%; }
    .switch input:checked + .slider { background:#2b8aef; }
    .switch input:checked + .slider:before { transform: translateX(20px); }

    .main-area { display:flex; height: calc(100% - var(--topbar-height) - var(--footer-height)); }
    #map { flex:1 1 auto; min-width:200px; height:100%; position:relative; }
    .sidebar {
      width: var(--sidebar-width); max-width:45%; background:#fff; border-left:1px solid rgba(0,0,0,0.06);
      padding:16px; box-sizing:border-box; overflow-y:auto; z-index:2000; position:relative;
    }
    .sidebar.collapsed { transform: translateX(100%); }
    .sidebar .sidebar-close { position:absolute; left:8px; top:8px; background:transparent; border:none; font-size:20px; cursor:pointer; }
    #controls-ui { display:flex; gap:8px; align-items:center; }
    #controls-ui button { background:#fff; border:1px solid #e6e6e6; padding:6px 10px; border-radius:6px; cursor:pointer; font-size:13px; }
    #controls-ui button.active { background:linear-gradient(180deg,#2b8aef,#1f6fd6); color:#fff; border-color: rgba(0,0,0,0.06); }
    .layer-switcher { margin-top:12px; padding-top:8px; border-top:1px dashed rgba(0,0,0,0.04); }
    .layer-switcher h3 { margin:0 0 8px 0; font-size:13px; }
    .ls-row { display:flex; align-items:center; gap:8px; margin:6px 0; }
    .footer { height:var(--footer-height); display:flex; align-items:center; justify-content:center; background:#fff; border-top:1px solid rgba(0,0,0,0.04); font-size:12px; color:#666; }

    /* popup */
    .attr-popup { font-size:13px; }
    .attr-popup label { display:block; margin-bottom:6px; font-weight:600; }
    .attr-popup textarea { width:260px; height:80px; box-sizing:border-box; }

    @media (max-width:900px) {
      .sidebar { width:280px; position:absolute; right:0; top:var(--topbar-height); height: calc(100% - var(--topbar-height) - var(--footer-height)); transform: translateX(0); transition: transform .22s ease; }
      .sidebar.collapsed { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1 class="app-title">Orhideeliste kasvualad — Palivere</h1>
    <div class="top-controls">
      <div class="toggle-wrap">
        <label class="switch">
          <input id="toggle-cadastral" type="checkbox" />
          <span class="slider"></span>
        </label>
        <span class="label">Katastriosa</span>
      </div>
      <div id="controls-ui"></div>
    </div>
  </header>

  <main class="main-area">
    <div id="map"></div>

    <aside id="sidebar" class="sidebar" role="complementary" aria-labelledby="sidebar-title">
      <!-- LAYER SWITCHER: kleebi see sidebarisse (enne </aside>) -->
<div id="layer-switcher" class="layer-switcher" aria-label="Kihtide valik">
  <h3>Kihtide valik</h3>
  <label><input type="checkbox" id="ls-osm" checked> <span>Baaskaart (OSM)</span></label><br>
  <label><input type="checkbox" id="ls-cad"> <span>Katastriosa</span></label><br>
  <label><input type="checkbox" id="ls-draw" checked> <span>Joonistused</span></label>
</div>

    </aside>
  </main>

  <footer class="footer">
    <small>Andmeallikas: Maa‑ ja Ruumiamet. Kasutamine CC‑BY 4.0 nõuete kohaselt.</small>
  </footer>

  <!-- OpenLayers UMD build (globaalne ol). Fallback to unpkg if jsdelivr blocked. -->
  <script>
    (function loadOl(cb){
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/ol@v7.4.0/dist/ol.js';
      s.crossOrigin = 'anonymous';
      s.onload = cb;
      s.onerror = function(){
        var s2 = document.createElement('script');
        s2.src = 'https://unpkg.com/ol@7.4.0/dist/ol.js';
        s2.crossOrigin = 'anonymous';
        s2.onload = cb;
        s2.onerror = function(){ console.error('OpenLayers CDN failed to load.'); cb(); };
        document.head.appendChild(s2);
      };
      document.head.appendChild(s);
    })(initApp);

    function initApp(){
      // Wait a tick to ensure ol is available
      setTimeout(() => {
        if (!window.ol) {
          document.getElementById('sidebar').innerHTML = '<h2>Viga</h2><p>OpenLayers ei laadinud. Kontrolli võrku või CDN‑i.</p>';
          console.error('OpenLayers not available.');
          return;
        }

        // --- Sidebar helpers ---
        const sidebarEl = document.getElementById('sidebar');
        // Asendatud setSidebarHtml: säilitab layer-switcher kui see on olemas
function setSidebarHtml(title, html) {
  // säilita layer-switcher, kui see on olemas
  const preserved = sidebarEl.querySelector('#layer-switcher');
  // puhasta sidebar
  sidebarEl.innerHTML = '';
  // lisa tagasi layer-switcher enne sisu, kui see oli olemas
  if (preserved) sidebarEl.appendChild(preserved);
  // lisa pealkiri ja sisu
  if (title) {
    const h = document.createElement('h2'); h.textContent = title; sidebarEl.appendChild(h);
  }
  const wrapper = document.createElement('div');
  wrapper.innerHTML = html || '';
  sidebarEl.appendChild(wrapper);
}

        function showWelcome() {
          setSidebarHtml('Tere tulemast', '<p>Vali objekt kaardilt või kasuta nuppe joonistamiseks ja salvestamiseks.</p>');
        }
        function showFeatureInfo(feature) {
          const title = feature.get('title') || 'Valitud objekt';
          const note = feature.get('note') || '';
          const props = feature.getProperties();
          let html = `<p>${escapeHtml(note)}</p><dl>`;
          for (const k in props) {
            if (k === 'geometry') continue;
            html += `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(String(props[k]))}</dd>`;
          }
          html += '</dl>';
          setSidebarHtml(title, html);
        }
        function escapeHtml(s=''){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

        // Add close button
        if (!sidebarEl.querySelector('.sidebar-close')) {
          const btn = document.createElement('button');
          btn.className = 'sidebar-close'; btn.innerHTML = '&times;'; btn.title = 'Sulge';
          btn.addEventListener('click', () => sidebarEl.classList.toggle('collapsed'));
          sidebarEl.prepend(btn);
        }

        showWelcome();

        // --- Map init ---
        const view = new ol.View({
          center: ol.proj.fromLonLat([24.0, 58.9]),
          zoom: 12
        });

        const osm = new ol.layer.Tile({ source: new ol.source.OSM(), zIndex:0 });
        // Katastriosa WMS (näide). Kui server CORSiga ei luba, võib see jääda tühjaks.
        const cadastral = new ol.layer.Image({
          source: new ol.source.ImageWMS({
            url: 'https://kaart.maaamet.ee/wms/alus',
            params: { LAYERS: 'BAASKAART', FORMAT: 'image/png', TRANSPARENT: true, VERSION: '1.3.0' },
            crossOrigin: 'anonymous'
          }),
          visible: false,
          zIndex: 500
        });

        // Draw layer
        const drawSource = new ol.source.Vector();
        const drawLayer = new ol.layer.Vector({
          source: drawSource,
          style: new ol.style.Style({
            fill: new ol.style.Fill({ color: 'rgba(255,165,0,0.25)' }),
            stroke: new ol.style.Stroke({ color: '#ff8c00', width: 2 }),
            image: new ol.style.Circle({ radius:6, fill: new ol.style.Fill({ color:'#ff8c00' }) })
          }),
          zIndex: 1000,
          visible: true
        });

        const map = new ol.Map({
          target: 'map',
          layers: [osm, cadastral, drawLayer],
          view: view,
          controls: [] // add controls manually
        });
                // Add controls manually (avoid ol.control.defaults issues)
        map.addControl(new ol.control.Zoom());
        map.addControl(new ol.control.FullScreen());
        map.addControl(new ol.control.Rotate({ autoHide: true }));
        map.addControl(new ol.control.ScaleLine({ units: 'metric' }));
        map.addControl(new ol.control.Attribution({ collapsible: true }));

        // --- Drawing interactions ---
        let drawInteraction = null;
        let modifyInteraction = null;
        let snapInteraction = null;

        function enableDraw(type='Polygon') {
          disableInteractions();
          if (type === 'Modify') {
            modifyInteraction = new ol.interaction.Modify({ source: drawSource });
            map.addInteraction(modifyInteraction);
            snapInteraction = new ol.interaction.Snap({ source: drawSource });
            map.addInteraction(snapInteraction);
            return;
          }
          drawInteraction = new ol.interaction.Draw({ source: drawSource, type: type });
          map.addInteraction(drawInteraction);
          modifyInteraction = new ol.interaction.Modify({ source: drawSource });
          map.addInteraction(modifyInteraction);
          snapInteraction = new ol.interaction.Snap({ source: drawSource });
          map.addInteraction(snapInteraction);

          drawInteraction.on('drawend', (evt) => {
            const f = evt.feature;
            f.setId('f-' + Date.now());
            f.set('createdAt', new Date().toISOString());
            f.set('title', f.get('title') || 'Märk');
            f.set('note', f.get('note') || '');
            // prompt for note (simple)
            setTimeout(() => {
              const note = prompt('Sisesta märge valitud alale:', f.get('note') || '');
              if (note !== null) f.set('note', note);
              saveToLocal();
            }, 50);
          });
        }

        function disableInteractions() {
          if (drawInteraction) map.removeInteraction(drawInteraction);
          if (modifyInteraction) map.removeInteraction(modifyInteraction);
          if (snapInteraction) map.removeInteraction(snapInteraction);
          drawInteraction = modifyInteraction = snapInteraction = null;
        }

        // --- Persistence (localStorage) ---
        const GEO_KEY = 'orhideed_features_v1';
        const format = new ol.format.GeoJSON();

        function saveToLocal() {
          try {
            const geojson = format.writeFeatures(drawSource.getFeatures(), { featureProjection: 'EPSG:3857' });
            localStorage.setItem(GEO_KEY, geojson);
            flashMessage('Salvestatud localStorage\'i');
          } catch (e) { console.error('Save failed', e); flashMessage('Salvestus ebaõnnestus'); }
        }

        function loadFromLocal() {
          try {
            const data = localStorage.getItem(GEO_KEY);
            if (!data) { flashMessage('LocalStorage tühi'); return; }
            const feats = format.readFeatures(data, { featureProjection: 'EPSG:3857' });
            drawSource.clear();
            drawSource.addFeatures(feats);
            flashMessage('Laetud localStorage\'ist');
          } catch (e) { console.error('Load failed', e); flashMessage('Laadimine ebaõnnestus'); }
        }

        function exportGeoJSON() {
          try {
            const geojson = format.writeFeatures(drawSource.getFeatures(), { featureProjection: 'EPSG:3857' });
            const blob = new Blob([geojson], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'features.geojson';
            document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);
          } catch (e) { console.error(e); flashMessage('Eksport ebaõnnestus'); }
        }

        function importGeoJSONFile(file) {
          const reader = new FileReader();
          reader.onload = () => {
            try {
              const feats = format.readFeatures(reader.result, { featureProjection: 'EPSG:3857' });
              drawSource.addFeatures(feats);
              saveToLocal();
              flashMessage('Imporditud GeoJSON');
            } catch (e) { console.error(e); flashMessage('Import ebaõnnestus'); }
          };
          reader.readAsText(file);
        }

        // --- UI controls (topbar) ---
        const controlsUi = document.getElementById('controls-ui');
        controlsUi.innerHTML = `
          <div id="btns">
            <button id="btn-draw">Joonista</button>
            <button id="btn-modify">Muuda</button>
            <button id="btn-save">Salvesta</button>
            <button id="btn-load">Laadi</button>
            <button id="btn-export">Ekspordi</button>
            <button id="btn-clear">Kustuta</button>
            <input id="file-input" type="file" accept=".geojson,application/json" style="display:none" />
          </div>
        `;

        document.getElementById('btn-draw').addEventListener('click', () => {
          enableDraw('Polygon');
          toggleActive('btn-draw');
          document.getElementById('btn-modify').classList.remove('active');
        });

        document.getElementById('btn-modify').addEventListener('click', () => {
          const el = document.getElementById('btn-modify');
          const active = el.classList.toggle('active');
          if (active) { enableDraw('Modify'); document.getElementById('btn-draw').classList.remove('active'); }
          else disableInteractions();
        });

        document.getElementById('btn-save').addEventListener('click', () => { saveToLocal(); });
        document.getElementById('btn-load').addEventListener('click', () => { loadFromLocal(); });
        document.getElementById('btn-export').addEventListener('click', () => { exportGeoJSON(); });
        document.getElementById('btn-clear').addEventListener('click', () => {
          if (confirm('Kustutada kõik joonised?')) { drawSource.clear(); saveToLocal(); }
        });

        const fileInput = document.getElementById('file-input');
        fileInput.addEventListener('change', (ev) => {
          const f = ev.target.files[0];
          if (f) importGeoJSONFile(f);
          fileInput.value = '';
        });

        // small helper to toggle active class
        function toggleActive(id) {
          const btns = ['btn-draw','btn-modify'];
          btns.forEach(b => { const el = document.getElementById(b); if (el) el.classList.remove('active'); });
          const el = document.getElementById(id); if (el) el.classList.add('active');
        }

        // --- Map click to show feature info in sidebar ---
        map.on('singleclick', (evt) => {
          const feature = map.forEachFeatureAtPixel(evt.pixel, (f) => f);
          if (feature) {
            showFeatureInfo(feature);
          } else {
            showWelcome();
          }
        });

        // --- Toggle cadastral WMS ---
        const toggle = document.getElementById('toggle-cadastral');
        toggle.checked = cadastral.getVisible();
        toggle.addEventListener('change', (ev) => cadastral.setVisible(!!ev.target.checked));

        // --- Layer switcher init (kleepi see toggle ploki järel, enne overlay loomist) ---
        function initLayerSwitcher(osm, cadastral, drawLayer) {
          const lsOsm = document.getElementById('ls-osm');
          const lsCad = document.getElementById('ls-cad');
          const lsDraw = document.getElementById('ls-draw');

          if (!lsOsm || !lsCad || !lsDraw) {
            console.warn('Layer switcher DOM elemendid puuduvad. Kontrolli, et HTML on sidebaris enne skripti.');
            return;
          }
          if (!osm || !cadastral || !drawLayer) {
            console.warn('Layer objekt(id) puuduvad. Kutsu initLayerSwitcher alles pärast kihtide loomist.');
            return;
          }

          // Sünkroniseeri algse nähtavusega
          try {
            lsOsm.checked = typeof osm.getVisible === 'function' ? osm.getVisible() : true;
            lsCad.checked = typeof cadastral.getVisible === 'function' ? cadastral.getVisible() : false;
            lsDraw.checked = typeof drawLayer.getVisible === 'function' ? drawLayer.getVisible() : true;
          } catch (e) {
            console.warn('Ei saanud sünkroniseerida layer nähtavust:', e);
          }

          // Kuulajad: checkbox -> layer
          lsOsm.addEventListener('change', (e) => { try { osm.setVisible(!!e.target.checked); } catch (err) { console.error(err); } });
          lsCad.addEventListener('change', (e) => { try { cadastral.setVisible(!!e.target.checked); } catch (err) { console.error(err); } });
          lsDraw.addEventListener('change', (e) => { try { drawLayer.setVisible(!!e.target.checked); } catch (err) { console.error(err); } });

          // Kui kihid muutuvad mujal, uuenda checkboxe
          if (typeof osm.on === 'function') osm.on('change:visible', () => { lsOsm.checked = osm.getVisible(); });
          if (typeof cadastral.on === 'function') cadastral.on('change:visible', () => { lsCad.checked = cadastral.getVisible(); });
          if (typeof drawLayer.on === 'function') drawLayer.on('change:visible', () => { lsDraw.checked = drawLayer.getVisible(); });
        }

        // Kutsu initLayerSwitcher SIIN (pärast map ja kihte on loodud)
        initLayerSwitcher(osm, cadastral, drawLayer);

        // --- Safe layer visibility persistence and listeners (paste after initLayerSwitcher(...) call) ---
        function saveLayerVisibility() {
          try {
            const lsOsm = document.getElementById('ls-osm');
            const lsCad = document.getElementById('ls-cad');
            const lsDraw = document.getElementById('ls-draw');
            const state = {
              osm: !!(lsOsm && lsOsm.checked),
              cad: !!(lsCad && lsCad.checked),
              draw: !!(lsDraw && lsDraw.checked)
            };
            localStorage.setItem('layer_visibility', JSON.stringify(state));
          } catch (e) { console.warn('saveLayerVisibility error', e); }
        }

        function restoreLayerVisibility(osm, cadastral, drawLayer) {
          try {
            const saved = localStorage.getItem('layer_visibility');
            if (!saved) return;
            const s = JSON.parse(saved);
            if (s.osm !== undefined && osm && typeof osm.setVisible === 'function') osm.setVisible(!!s.osm);
            if (s.cad !== undefined && cadastral && typeof cadastral.setVisible === 'function') cadastral.setVisible(!!s.cad);
            if (s.draw !== undefined && drawLayer && typeof drawLayer.setVisible === 'function') drawLayer.setVisible(!!s.draw);
            // sync checkboxes with actual layer visibility
            const lsOsm = document.getElementById('ls-osm');
            const lsCad = document.getElementById('ls-cad');
            const lsDraw = document.getElementById('ls-draw');
            if (lsOsm) lsOsm.checked = osm.getVisible();
            if (lsCad) lsCad.checked = cadastral.getVisible();
            if (lsDraw) lsDraw.checked = drawLayer.getVisible();
          } catch (e) { console.warn('restoreLayerVisibility error', e); }
        }

        (function attachLayerSwitcherListeners() {
          const lsOsm = document.getElementById('ls-osm');
          const lsCad = document.getElementById('ls-cad');
          const lsDraw = document.getElementById('ls-draw');
          if (!lsOsm || !lsCad || !lsDraw) {
            // elemente pole DOMis veel — proovi uuesti veidi hiljem
            setTimeout(attachLayerSwitcherListeners, 120);
            return;
          }

          lsOsm.addEventListener('change', () => {
            try { osm.setVisible(!!lsOsm.checked); saveLayerVisibility(); } catch(e){ console.error(e); }
          });
          lsCad.addEventListener('change', () => {
            try { cadastral.setVisible(!!lsCad.checked); saveLayerVisibility(); } catch(e){ console.error(e); }
          });
          lsDraw.addEventListener('change', () => {
            try { drawLayer.setVisible(!!lsDraw.checked); saveLayerVisibility(); } catch(e){ console.error(e); }
          });

          // taastame salvestatud seisu kohe
          restoreLayerVisibility(osm, cadastral, drawLayer);
        })();

        // --- Popup overlay for editing attributes (optional) ---
        const overlayEl = document.createElement('div');
        overlayEl.className = 'attr-popup';
        const overlay = new ol.Overlay({ element: overlayEl, autoPan: true, autoPanAnimation: { duration: 200 } });
        map.addOverlay(overlay);

        // Double click on feature to edit note
        map.on('dblclick', (evt) => {
          const feature = map.forEachFeatureAtPixel(evt.pixel, (f) => f);
          if (!feature) return;
          const coord = evt.coordinate;
          overlay.setPosition(coord);
          overlayEl.innerHTML = `
            <label for="note">Märge</label>
            <textarea id="note">${escapeHtml(feature.get('note')||'')}</textarea>
            <div style="margin-top:8px;display:flex;gap:8px;">
              <button id="save-note">Salvesta</button>
              <button id="cancel-note">Tühista</button>
            </div>
          `;
          document.getElementById('save-note').addEventListener('click', () => {
            const val = document.getElementById('note').value;
            feature.set('note', val);
            saveToLocal();
            overlay.setPosition(undefined);
            showFeatureInfo(feature);
          });
          document.getElementById('cancel-note').addEventListener('click', () => overlay.setPosition(undefined));
        });

        // --- Small toast / flash message ---
        let flashTimer = null;
        function flashMessage(msg, ms=1400) {
          clearTimeout(flashTimer);
          const elId = '__flash_msg';
          let el = document.getElementById(elId);
          if (!el) {
            el = document.createElement('div'); el.id = elId;
            el.style.position = 'absolute'; el.style.left = '12px'; el.style.bottom = '12px';
            el.style.padding = '8px 12px'; el.style.background = 'rgba(0,0,0,0.7)'; el.style.color = '#fff';
            el.style.borderRadius = '6px'; el.style.zIndex = 9999; document.body.appendChild(el);
          }
          el.textContent = msg; el.style.display = 'block';
          flashTimer = setTimeout(() => { el.style.display = 'none'; }, ms);
        }

        // --- Auto-load saved features on start ---
        try { loadFromLocal(); } catch (e) { /* ignore */ }

        // --- Keyboard shortcuts ---
        window.addEventListener('keydown', (ev) => {
          if (ev.key === 'd') { enableDraw('Polygon'); toggleActive('btn-draw'); }
          if (ev.key === 'm') { enableDraw('Modify'); document.getElementById('btn-modify').classList.add('active'); }
          if (ev.key === 'Escape') { disableInteractions(); document.getElementById('btn-draw').classList.remove('active'); document.getElementById('btn-modify').classList.remove('active'); }
        });

        // Prevent default double-click zoom so our dblclick works for editing
        map.getInteractions().forEach(i => {
          if (i instanceof ol.interaction.DoubleClickZoom) map.removeInteraction(i);
        });

        console.info('Kaart initsialiseeritud (UMD).');
      }, 50);
    }
  
  // Aseta --vh muutuja, et vältida 100vh probleeme mobiilides (aadressiriba)
function setVhVar() {
  document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px');
}
setVhVar();
window.addEventListener('resize', setVhVar);

// Eemalda loader kui kõik on valmis. Kui tahad oodata kaardi initsialiseerimist,
// kutsu removeLoader() peale map initsialiseerimist (näiteks pärast console.info('Kaart initsialiseeritud')).
function removeLoader() {
  const loader = document.getElementById('page-loader');
  if (!loader) return;
  loader.style.transition = 'opacity 220ms ease';
  loader.style.opacity = '0';
  setTimeout(() => { loader.remove(); }, 240);
}

// Kui tahad eemaldada loaderi automaatselt lehe laadimisel:
window.addEventListener('load', () => {
  // väike viivitus, et kõik ressursid jõuaksid valmis
  setTimeout(removeLoader, 120);
});

// Alternatiiv: kui soovid eemaldada loaderi alles siis, kui kaart on initsialiseeritud,
// kutsu removeLoader() otse oma initApp / kaart initsialiseerimise lõpus.
 </script>
